name: Sync from Google Sheet

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          SHEET_ID: ${{ vars.SHEET_ID }}
        run: node scripts/sync.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json criteria.json
          if git diff --cached --quiet; then
            echo "Aucun changement détecté."
          else
            git commit -m "data: sync from Google Sheet ($(date -u +%Y-%m-%d))"
            git push
          fi
